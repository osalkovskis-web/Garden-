; Dārza vārteja — LILYGO T-SIM7080G-S3
; ESP32-S3 + SIM7080G (LTE Cat-M1/NB-IoT) + saules uzlāde + 18650
;
; Pievienojumi (T-SIM7080G-S3 iebūvēti — LilyGO pinout):
;   SIM7080G RX ← GPIO11 (ESP TX)
;   SIM7080G TX → GPIO10 (ESP RX)
;   SIM7080G PWR KEY → GPIO18
;   SIM7080G RESET → GPIO17
;   Saules paneļa + → SOLAR pin (iebūvēts)
;   18650 → akumulatora slots (iebūvēts)
;
; Ārējie:
;   GPIO38 → Relay IN (laistīšanas vārsts/pumpa)
;   GPIO12 → statusa LED (zaļš = MQTT OK)
;
; Avots: github.com/Xinyuan-LilyGO/LilyGo-Modem-Series

[env:t-sim7080g-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.arduino.memory_type = qio_opi

build_flags =
    -DTINY_GSM_MODEM_SIM7080
    -DTINY_GSM_RX_BUFFER=1024
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    vshymanskyy/TinyGSM @ ^0.11.7
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^7.0.0
