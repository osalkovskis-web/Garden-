; Dārza vārteja — LILYGO TTGO T-SIM7000G
; ESP32 + SIM7000G (LTE-M/NB-IoT/GPRS) + saules uzlāde + 18650
;
; Pievienojumi (T-SIM7000G iebūvēti):
;   SIM7000G TX → GPIO26, RX → GPIO27
;   SIM7000G PWR → GPIO4
;   Saules paneļa + → SOLAR pin (iebūvēts)
;   18650 → akumulatora slots (iebūvēts)
;
; Ārējie:
;   GPIO12 → Relay IN (laistīšanas vārsts/pumpa)
;   GPIO13 → statusa LED (zaļš = MQTT OK)

[env:t-sim7000g]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DTINY_GSM_MODEM_SIM7000
    -DTINY_GSM_RX_BUFFER=1024

lib_deps =
    vshymanskyy/TinyGSM @ ^0.11.7
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^7.0.0
