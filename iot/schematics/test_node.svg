<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 740" width="980" height="740">
<defs>
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="#ddd"/>
  </pattern>
  <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
  </marker>
</defs>

<!-- Background -->
<rect width="980" height="740" fill="#f8f9fa" rx="12"/>
<rect width="980" height="740" fill="url(#dots)"/>

<!-- Title bar -->
<rect x="0" y="0" width="980" height="46" fill="#1b5e20" rx="12"/>
<rect x="0" y="30" width="980" height="16" fill="#1b5e20"/>
<text x="490" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="white">TESTS — Sensoru mezgls prototips  (breadboard + jumper vadi)</text>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!-- WIRES — drawn first so components appear on top                       -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->

<!-- Battery B+ → TP4056 B+  (amber) -->
<polyline points="100,200 100,290" fill="none" stroke="#f57f17" stroke-width="2.5"/>
<!-- Battery B- → TP4056 B-  (dark) -->
<polyline points="145,200 145,290" fill="none" stroke="#37474f" stroke-width="2.5"/>

<!-- TP4056 OUT+ → ESP32 VIN  (red, with voltage-divider branch junction) -->
<polyline points="185,310 199,310 225,310 225,150 265,150" fill="none" stroke="#e53935" stroke-width="2.5"/>
<!-- Voltage divider branch from junction (199,310) down to R1 top -->
<polyline points="199,310 199,445" fill="none" stroke="#e53935" stroke-width="2.5"/>
<!-- Junction dot -->
<circle cx="199" cy="310" r="4" fill="#e53935"/>

<!-- TP4056 OUT- → GND rail  (black) -->
<polyline points="185,345 232,345 232,650" fill="none" stroke="#212121" stroke-width="2.5"/>

<!-- ESP32 GND → GND rail  (black) -->
<polyline points="265,200 244,200 244,650" fill="none" stroke="#212121" stroke-width="2.5"/>

<!-- R1 bottom → R2 top  (midpoint) + → GPIO35 (purple/orange) -->
<polyline points="199,493 199,505" fill="none" stroke="#e53935" stroke-width="2.5"/>
<!-- midpoint → GPIO35 -->
<polyline points="199,493 265,493" fill="none" stroke="#7b1fa2" stroke-width="2.5" stroke-dasharray="5,2"/>
<circle cx="199" cy="493" r="4" fill="#7b1fa2"/>

<!-- R2 bottom → GND rail -->
<polyline points="199,553 199,650" fill="none" stroke="#212121" stroke-width="2.5"/>

<!-- 3V3 bus: ESP32 right (3V3 pin at 425,170) → up → horizontal bus at y=100 -->
<polyline points="425,170 425,100 840,100" fill="none" stroke="#ef6c00" stroke-width="2.5"/>
<!-- 3V3 drop → Moisture Sensor VCC -->
<polyline points="655,100 655,185" fill="none" stroke="#ef6c00" stroke-width="2.5"/>
<!-- 3V3 drop → DS18B20 VCC (right edge routing) -->
<polyline points="815,100 815,415 655,415" fill="none" stroke="#ef6c00" stroke-width="2.5"/>
<!-- 3V3 drop → R3 pull-up top (between MOSFET and moisture sensor) -->
<polyline points="470,100 470,400 546,400" fill="none" stroke="#ef6c00" stroke-width="2.5"/>

<!-- GPIO32 → MOSFET Gate  (blue digital) -->
<polyline points="425,265 500,265" fill="none" stroke="#1565c0" stroke-width="2.5"/>

<!-- Moisture AOUT → GPIO34  (purple ADC) -->
<polyline points="655,258 638,258 638,345 425,345" fill="none" stroke="#7b1fa2" stroke-width="2.5" stroke-dasharray="6,2"/>

<!-- GPIO25 → DS18B20 DATA via R3  (green 1-wire) -->
<polyline points="425,445 546,445 655,445" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
<circle cx="546" cy="445" r="4" fill="#2e7d32"/>

<!-- Moisture GND → MOSFET Drain  (switched GND, dark red) -->
<polyline points="655,218 547,218 547,215" fill="none" stroke="#b71c1c" stroke-width="2" stroke-dasharray="4,2"/>

<!-- MOSFET Source → GND rail -->
<polyline points="547,335 547,650" fill="none" stroke="#212121" stroke-width="2.5"/>

<!-- DS18B20 GND → GND rail -->
<polyline points="655,470 655,650" fill="none" stroke="#212121" stroke-width="2.5"/>

<!-- GND rail (thick horizontal) -->
<line x1="195" y1="650" x2="840" y2="650" stroke="#212121" stroke-width="3.5"/>
<!-- GND label -->
<text x="490" y="668" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#212121">⏚  GND</text>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!-- COMPONENTS                                                             -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->

<!-- ── 18650 BATTERY ─────────────────────────────────────────────────── -->
<rect x="55" y="135" width="130" height="65" rx="8" fill="#fffde7" stroke="#f57f17" stroke-width="2.5"/>
<text x="120" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#e65100">18650</text>
<text x="120" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#bf360c">Li-ion  3.7 – 4.2 V</text>
<!-- Terminal marks -->
<text x="92" y="194" text-anchor="middle" font-family="monospace" font-size="10" fill="#e53935">B+</text>
<text x="148" y="194" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">B−</text>
<!-- terminal dots -->
<circle cx="100" cy="200" r="3.5" fill="#f57f17"/>
<circle cx="145" cy="200" r="3.5" fill="#37474f"/>

<!-- ── TP4056 CHARGER ──────────────────────────────────────────────────── -->
<rect x="55" y="290" width="130" height="85" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
<text x="120" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#0d47a1">TP4056</text>
<text x="120" y="331" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1565c0">Lādētājs</text>
<!-- B+ B- top -->
<text x="88" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#e53935">B+</text>
<text x="148" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">B−</text>
<!-- OUT+/OUT- right -->
<text x="190" y="312" text-anchor="start" font-family="monospace" font-size="9" fill="#e53935">OUT+</text>
<text x="190" y="348" text-anchor="start" font-family="monospace" font-size="9" fill="#333">OUT−</text>
<circle cx="185" cy="310" r="3" fill="#e53935"/>
<circle cx="185" cy="345" r="3" fill="#37474f"/>
<!-- USB indication -->
<rect x="56" y="350" width="30" height="16" rx="3" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
<text x="71" y="362" text-anchor="middle" font-family="monospace" font-size="8" fill="#0d47a1">USB</text>

