<!-- Pins labels -->
<text x="503" y="269" font-family="monospace" font-size="9" fill="#1565c0" text-anchor="start">G</text>
<text x="535" y="218" font-family="monospace" font-size="9" fill="#b71c1c" text-anchor="middle">D</text>
<text x="535" y="344" font-family="monospace" font-size="9" fill="#333" text-anchor="middle">S</text>
<!-- pin dots -->
<circle cx="500" cy="265" r="3.5" fill="#1565c0"/>
<circle cx="547" cy="215" r="3.5" fill="#b71c1c"/>
<circle cx="547" cy="335" r="3.5" fill="#212121"/>

