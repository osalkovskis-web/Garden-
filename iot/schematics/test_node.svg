<rect x="265" y="85" width="160" height="550" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
<text x="345" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1b5e20">ESP32</text>
<text x="345" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#388e3c">DevKit C</text>
<!-- divider -->
<line x1="275" y1="138" x2="415" y2="138" stroke="#a5d6a7" stroke-width="1"/>

<!-- LEFT PIN LABELS (inside, right-aligned to left edge) -->
<!-- VIN -->
<text x="270" y="153" font-family="monospace" font-size="9" fill="#c62828" text-anchor="start">VIN</text>
<circle cx="265" cy="150" r="3.5" fill="#e53935"/>
<!-- GND -->
<text x="270" y="203" font-family="monospace" font-size="9" fill="#333" text-anchor="start">GND</text>
<circle cx="265" cy="200" r="3.5" fill="#212121"/>
<!-- 3V3 -->
<text x="270" y="253" font-family="monospace" font-size="9" fill="#bf360c" text-anchor="start">3V3</text>
<circle cx="265" cy="250" r="3.5" fill="#ef6c00"/>
<!-- GPIO35 (ADC, bat monitor) -->
<text x="270" y="495" font-family="monospace" font-size="9" fill="#6a1b9a" text-anchor="start">GPIO35</text>
<text x="270" y="507" font-family="monospace" font-size="9" fill="#888" text-anchor="start">(ADC–Batt)</text>
<circle cx="265" cy="493" r="3.5" fill="#7b1fa2"/>

<!-- RIGHT PIN LABELS -->
<!-- 3V3 right -->
<text x="420" y="173" font-family="monospace" font-size="9" fill="#bf360c" text-anchor="start">3V3</text>
<circle cx="425" cy="170" r="3.5" fill="#ef6c00"/>
<!-- GPIO32 (MOSFET) -->
<text x="380" y="268" font-family="monospace" font-size="9" fill="#1565c0" text-anchor="end">GPIO32</text>
<text x="380" y="280" font-family="monospace" font-size="9" fill="#888" text-anchor="end">(MOSFET)</text>
<circle cx="425" cy="265" r="3.5" fill="#1565c0"/>
<!-- GPIO34 (ADC moisture) -->
<text x="380" y="348" font-family="monospace" font-size="9" fill="#6a1b9a" text-anchor="end">GPIO34</text>
<text x="380" y="360" font-family="monospace" font-size="9" fill="#888" text-anchor="end">(ADC–Mitrs)</text>
<circle cx="425" cy="345" r="3.5" fill="#7b1fa2"/>
<!-- GPIO25 (DS18B20) -->
<text x="380" y="448" font-family="monospace" font-size="9" fill="#2e7d32" text-anchor="end">GPIO25</text>
<text x="380" y="460" font-family="monospace" font-size="9" fill="#888" text-anchor="end">(1-Wire)</text>
<circle cx="425" cy="445" r="3.5" fill="#2e7d32"/>

<!-- ── IRLZ44N MOSFET (N-channel, low-side) ───────────────────────────── -->
<rect x="500" y="215" width="95" height="120" rx="7" fill="#fafafa" stroke="#424242" stroke-width="2.5"/>
<text x="547" y="242" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#212121">IRLZ44N</text>
