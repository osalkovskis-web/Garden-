; Dārza mitruma sensors — ESP32 ar deep sleep + ESP-NOW
; Pievienojumi:
;   GPIO32 → IRLZ44N gate (sensora barošana)
;   GPIO34 → Kapacitīvā sensora AOUT (ADC, tikai input!)
;   GPIO35 → Baterijas voltage divider (100k + 100k, ADC)
;   GPIO25 → DS18B20 data (ar 4.7k pull-up uz 3.3V)
;   LED_BUILTIN → statusa LED

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    bblanchon/ArduinoJson @ ^7.0.0
